<!DOCTYPE html>

  <title>한국 중심 세계지도</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1f4d;
      touch-action: none;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }

    #map {
      width: 100vw;
      height: 100vh;
      background: #0b1f4d;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    #map:active {
      cursor: grabbing;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      background: #0b1f4d;
    }

    .land {
      fill: #e7d8b4;
      stroke: #4f4330;
      stroke-width: 0.55;
      vector-effect: non-scaling-stroke;
    }

    .country-label {
      fill: #2e261b;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      user-select: none;
      paint-order: stroke;
      stroke: rgba(245, 239, 224, 0.96);
      stroke-width: 2.4px;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .country-label tspan {
      dominant-baseline: middle;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 20px;
      background: #0b1f4d;
      z-index: 10;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #ffd6d6;
    }
  </style>
</head>

    function project(lon, lat) {
      const x = ((lon + 180) / 360) * WORLD_W;
      const y = ((90 - lat) / 180) * WORLD_H;
      return [x, y];
    }

    function normalizeLon180(lon) {
      let v = lon;
      while (v < -180) v += 360;
      while (v > 180) v -= 360;
      return v;
    }

    function splitRingAtDateline(ring) {
      if (!ring || ring.length < 2) return [ring];

      const segments = [];
      let current = [ring[0]];

      for (let i = 1; i < ring.length; i++) {
        const prev = ring[i - 1];
        const curr = ring[i];
        const prevLon = normalizeLon180(prev[0]);
        const currLon = normalizeLon180(curr[0]);
        const jump = Math.abs(currLon - prevLon);

        if (jump > 180) {
          if (current.length >= 3) segments.push(current);
          current = [curr];
        } else {
          current.push(curr);
        }
      }

      if (current.length >= 3) segments.push(current);
      return segments;
    }

    function buildPathFromRing(ring) {
      if (!ring || !ring.length) return "";
      let d = "";
      for (let i = 0; i < ring.length; i++) {
        const [lon, lat] = ring[i];
        const [x, y] = project(lon, lat);
        d += (i === 0 ? "M" : "L") + x + " " + y + " ";
      }
      d += "Z ";
      return d;
    }

    function geometryToPath(geometry) {
      let d = "";

      if (geometry.type === "Polygon") {
        for (const ring of geometry.coordinates) {
          const pieces = splitRingAtDateline(ring);
          for (const piece of pieces) d += buildPathFromRing(piece);
        }
      } else if (geometry.type === "MultiPolygon") {
        for (const polygon of geometry.coordinates) {
          for (const ring of polygon) {
            const pieces = splitRingAtDateline(ring);
            for (const piece of pieces) d += buildPathFromRing(piece);
          }
        }
      }

      return d;
    }

    function polygonArea(points) {
      let area = 0;
      const n = points.length;
      for (let i = 0; i < n; i++) {
        const [x1, y1] = points[i];
        const [x2, y2] = points[(i + 1) % n];
        area += x1 * y2 - x2 * y1;
      }
      return Math.abs(area) * 0.5;
    }

    function getGeometryProjectedPieces(geometry) {
      const out = [];

      if (geometry.type === "Polygon") {
        for (const ring of geometry.coordinates) {
          const pieces = splitRingAtDateline(ring);
          for (const piece of pieces) {
            out.push(piece.map(([lon, lat]) => project(lon, lat)));
          }
        }
      } else if (geometry.type === "MultiPolygon") {
        for (const polygon of geometry.coordinates) {
          for (const ring of polygon) {
            const pieces = splitRingAtDateline(ring);
            for (const piece of pieces) {
              out.push(piece.map(([lon, lat]) => project(lon, lat)));
            }
          }
        }
      }

      return out.filter(piece => piece.length >= 3);
    }

    function getLabelPlacement(geometry) {
      const pieces = getGeometryProjectedPieces(geometry);
      if (!pieces.length) return null;

      let bestPiece = pieces[0];
      let bestArea = polygonArea(bestPiece);

      for (let i = 1; i < pieces.length; i++) {
        const area = polygonArea(pieces[i]);
        if (area > bestArea) {
          bestArea = area;
          bestPiece = pieces[i];
        }
      }

      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const [x, y] of bestPiece) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }

      return {
        x: (minX + maxX) / 2,
        y: (minY + maxY) / 2,
        width: maxX - minX,
        height: maxY - minY,
        area: bestArea
      };
    }

    function getCountryCode(feature) {
      const p = feature.properties || {};
      const candidates = [
        p.ISO_A2,
        p.iso_a2,
        p["ISO3166-1-Alpha-2"],
        p.ISO2,
        p.iso2
      ];

      for (const code of candidates) {
        if (typeof code === "string") {
          const c = code.trim().toUpperCase();
          if (/^[A-Z]{2}$/.test(c)) return c;
        }
      }
      return null;
    }

    function getEnglishCountryName(feature) {
      const p = feature.properties || {};
      return (
        p.NAME_KO ||
        p.NAME_LONG ||
        p.NAME ||
        p.ADMIN ||
        p.BRK_NAME ||
        p.SOVEREIGNT ||
        p.name ||
        p.admin ||
        "이름없음"
      );
    }

    function cleanCountryName(name) {
      return String(name)
        .replace(/\s*특별행정구\s*/g, "")
        .replace(/\s*S\.?A\.?R\.?\s*/gi, "")
        .replace(/\s*SAR\s*/gi, "")
        .replace(/\s{2,}/g, " ")
        .trim();
    }

    function getCountryNameKo(feature) {
      const code = getCountryCode(feature);
      const en = getEnglishCountryName(feature);

      if (code && CODE_KO[code]) return cleanCountryName(CODE_KO[code]);
      if (COUNTRY_KO[en]) return cleanCountryName(COUNTRY_KO[en]);

      return cleanCountryName(en);
    }

    function shouldHideFeature(feature) {
      const code = getCountryCode(feature);
      const en = getEnglishCountryName(feature);
      return HIDE_CODES.has(code) || HIDE_NAMES.has(en);
    }

    function chooseLabelZoom(area, width, height, name) {
      const len = name.length;

      if (area > 12000 && width > 65 && height > 18) return 1.0;
      if (area > 6000 && width > 45 && height > 14) return 1.2;
      if (area > 2500 && width > 28 && height > 10) return 1.6;
      if (area > 900 && width > 18 && height > 8) return 2.1;
      if (area > 300 && width > 10 && height > 6) return 3.0;
      if (area > 120) return 4.3;
      if (area > 45) return 6.2;
      if (len <= 4) return 8.0;
      if (len <= 8) return 10.0;
      return 12.0;
    }

    function splitNameLines(name) {
      const parts = name.split(/\s+/).filter(Boolean);
      if (parts.length <= 1) return [name];

      if (parts.length === 2) return [parts[0], parts[1]];

      if (parts.length === 3) return [
        parts[0],
        parts.slice(1).join(" ")
      ];

      const lines = [];
      let current = "";

      for (const part of parts) {
        if (!current) {
          current = part;
        } else if ((current + " " + part).length <= 8) {
          current += " " + part;
        } else {
          lines.push(current);
          current = part;
        }
      }
      if (current) lines.push(current);

      if (lines.length > 3) {
        return [
          lines[0],
          lines.slice(1, lines.length - 1).join(" "),
          lines[lines.length - 1]
        ];
      }

      return lines;
    }

    function chooseFontSize(area, width, height, name) {
      const lines = splitNameLines(name);
      const longest = lines.reduce((m, s) => Math.max(m, s.length), 1);
      const est = Math.max(7, Math.min(24, Math.sqrt(area) * 0.16));
      const widthFit = Math.max(6.5, Math.min(est, width / Math.max(1.8, longest * 0.62)));
      const heightFit = Math.max(6.5, Math.min(widthFit, height / Math.max(1.15, lines.length * 0.82)));
      return Math.max(6.5, Math.min(24, heightFit));
    }

    function createLabelElement(item) {
      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("class", "country-label");
      text.setAttribute("font-size", item.baseFontSize.toFixed(2));

      const lineGap = item.baseFontSize * 0.96;
      const startDy = -((item.lines.length - 1) * lineGap) / 2;

      item.lines.forEach((line, i) => {
        const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
        tspan.setAttribute("x", item.x.toFixed(2));
        tspan.setAttribute("dy", i === 0 ? startDy.toFixed(2) : lineGap.toFixed(2));
        tspan.textContent = line;
        text.appendChild(tspan);
      });

      return text;
    }

    function estimateLabelRectScreen(item, offsetXScreen, offsetYScreen) {
      const cx = item.x * scale + translateX + offsetXScreen;
      const cy = item.y * scale + translateY + offsetYScreen;
      const width = item.textWidth * scale;
      const height = item.textHeight * scale;

      return {
        left: cx - width / 2 - 3,
        right: cx + width / 2 + 3,
        top: cy - height / 2 - 2,
        bottom: cy + height / 2 + 2
      };
    }

    function rectsOverlap(a, b) {
      return !(
        a.right <= b.left ||
        a.left >= b.right ||
        a.bottom <= b.top ||
        a.top >= b.bottom
      );
    }

    function clampTranslate() {
      const scaledW = WORLD_W * scale;
      const scaledH = WORLD_H * scale;

      if (scaledW <= VIEW_W) {
        translateX = (VIEW_W - scaledW) / 2;
      } else {
        const minX = VIEW_W - scaledW;
        const maxX = 0;
        if (translateX < minX) translateX = minX;
        if (translateX > maxX) translateX = maxX;
      }

      if (scaledH <= VIEW_H) {
        translateY = (VIEW_H - scaledH) / 2;
      } else {
        const minY = VIEW_H - scaledH;
        const maxY = 0;
        if (translateY < minY) translateY = minY;
        if (translateY > maxY) translateY = maxY;
      }
    }

    function applyLabelLayout() {
      const placed = [];

      for (const item of labelItems) {
        item.el.style.display = "none";
      }

      const ordered = [...labelItems]
        .filter(item => scale >= item.minZoom)
        .sort((a, b) => {
          if (a.priority !== b.priority) return b.priority - a.priority;
          return a.name.length - b.name.length;
        });

      for (const item of ordered) {
        const f = item.baseFontSize;
        const tryOffsets = [
          [0, 0],
          [0, -f * 0.9],
          [0, f * 0.9],
          [-f * 1.15, 0],
          [f * 1.15, 0],
          [-f * 1.0, -f * 0.9],
          [f * 1.0, -f * 0.9],
          [-f * 1.0, f * 0.9],
          [f * 1.0, f * 0.9],
          [0, -f * 1.7],
          [0, f * 1.7]
        ];

        let chosen = null;
        let chosenRect = null;

        for (const [ox, oy] of tryOffsets) {
          const rect = estimateLabelRectScreen(item, ox * scale, oy * scale);

          if (
            rect.right < -30 ||
            rect.left > VIEW_W + 30 ||
            rect.bottom < -30 ||
            rect.top > VIEW_H + 30
          ) {
            continue;
          }

          let bad = false;
          for (const p of placed) {
            if (rectsOverlap(rect, p.rect)) {
              bad = true;
              break;
            }
          }

          if (!bad) {
            chosen = [ox, oy];
            chosenRect = rect;
            break;
          }
        }

        if (!chosen) continue;

        item.el.style.display = "";
        const lineGap = item.baseFontSize * 0.96;
        const startDy = -((item.lines.length - 1) * lineGap) / 2;
        const tspans = item.el.querySelectorAll("tspan");

        tspans.forEach((tspan, i) => {
          tspan.setAttribute("x", (item.x + chosen[0]).toFixed(2));
          tspan.setAttribute("dy", i === 0 ? startDy.toFixed(2) : lineGap.toFixed(2));
        });

        item.el.setAttribute("transform", `translate(0 ${chosen[1].toFixed(2)})`);

        placed.push({ rect: chosenRect });
      }
    }

    function setTransform() {
      clampTranslate();
      world.setAttribute("transform", `translate(${translateX} ${translateY}) scale(${scale})`);
      applyLabelLayout();
    }

    function zoomAtWorldPoint(worldX, worldY, factor) {
      const newScale = Math.max(minScale, Math.min(maxScale, scale * factor));
      const actualFactor = newScale / scale;
      if (actualFactor === 1) return;

      translateX = worldX - (worldX - translateX) * actualFactor;
      translateY = worldY - (worldY - translateY) * actualFactor;
      scale = newScale;
      setTransform();
    }

    function screenToWorld(clientX, clientY) {
      const rect = svg.getBoundingClientRect();
      return {
        x: ((clientX - rect.left) / rect.width) * VIEW_W,
        y: ((clientY - rect.top) / rect.height) * VIEW_H
      };
    }

    function getTouchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.hypot(dx, dy);
    }

    function getTouchMidpoint(t1, t2) {
      return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
      };
    }

    svg.addEventListener("wheel", (e) => {
      e.preventDefault();
      const worldPoint = screenToWorld(e.clientX, e.clientY);
      zoomAtWorldPoint(worldPoint.x, worldPoint.y, e.deltaY < 0 ? 1.24 : 1 / 1.24);
    }, { passive: false });

    svg.addEventListener("pointerdown", (e) => {
      if (e.pointerType !== "mouse" || e.button === 0) {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        svg.setPointerCapture(e.pointerId);
      }
    });

    svg.addEventListener("pointermove", (e) => {
      if (!isDragging) return;

      const rect = svg.getBoundingClientRect();
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;

      translateX += dx * (VIEW_W / rect.width);
      translateY += dy * (VIEW_H / rect.height);
      setTransform();
    });

    function endDrag() {
      isDragging = false;
    }

    svg.addEventListener("pointerup", endDrag);
    svg.addEventListener("pointercancel", endDrag);
    svg.addEventListener("pointerleave", endDrag);

    svg.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        const mid = getTouchMidpoint(e.touches[0], e.touches[1]);
        const worldMid = screenToWorld(mid.x, mid.y);
        pinchCenterWorld = worldMid;
        pinchStartDist = getTouchDistance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
      }
    }, { passive: false });

    svg.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();

        const mid = getTouchMidpoint(e.touches[0], e.touches[1]);
        const worldMid = screenToWorld(mid.x, mid.y);
        const dist = getTouchDistance(e.touches[0], e.touches[1]);

        if (!pinchCenterWorld) {
          pinchCenterWorld = worldMid;
          pinchStartDist = dist;
          pinchStartScale = scale;
          return;
        }

        const factor = dist / Math.max(1, pinchStartDist);
        const newScale = Math.max(minScale, Math.min(maxScale, pinchStartScale * factor));
        const actualFactor = newScale / scale;

        translateX = pinchCenterWorld.x - (pinchCenterWorld.x - translateX) * actualFactor;
        translateY = pinchCenterWorld.y - (pinchCenterWorld.y - translateY) * actualFactor;
        scale = newScale;
        setTransform();
      }
    }, { passive: false });

    svg.addEventListener("touchend", (e) => {
      if (e.touches.length < 2) {
        pinchCenterWorld = null;
      }
    });

    function centerOnKorea(initialScale) {
      const [kx, ky] = project(127.7669, 35.9078);
      scale = Math.max(minScale, Math.min(maxScale, initialScale));
      translateX = VIEW_W / 2 - kx * scale;
      translateY = VIEW_H / 2 - ky * scale;
      setTransform();
    }

    async function loadWorld() {
      try {
        const res = await fetch("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_0_countries.geojson");
        const geojson = await res.json();

        for (const feature of geojson.features) {
          if (!feature.geometry || shouldHideFeature(feature)) continue;

          const d = geometryToPath(feature.geometry);
          if (!d) continue;

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("class", "land");
          countriesGroup.appendChild(path);

          const labelPos = getLabelPlacement(feature.geometry);
          if (!labelPos) continue;

          const name = getCountryNameKo(feature);
          const lines = splitNameLines(name);
          const fontSize = chooseFontSize(labelPos.area, labelPos.width, labelPos.height, name);
          const minZoomForLabel = chooseLabelZoom(labelPos.area, labelPos.width, labelPos.height, name);

          const textWidth = Math.max(
            fontSize * 1.15,
            Math.max(...lines.map(line => line.length), 1) * fontSize * 0.62
          );
          const textHeight = Math.max(fontSize * 1.12, lines.length * fontSize * 0.86);

          const item = {
            name,
            lines,
            x: labelPos.x,
            y: labelPos.y,
            area: labelPos.area,
            minZoom: minZoomForLabel,
            baseFontSize: fontSize,
            textWidth,
            textHeight,
            priority: labelPos.area * 10 + Math.min(labelPos.width, 120) * 4 + Math.min(labelPos.height, 60) * 3
          };

          item.el = createLabelElement(item);
          labelsGroup.appendChild(item.el);
          labelItems.push(item);
        }

        loading.classList.add("hidden");
        minScale = 1;
        centerOnKorea(2.2);
      } catch (err) {
        loading.textContent = "지도 데이터를 불러오지 못했습니다.";
        loading.classList.add("error");
        console.error(err);
      }
    }

    loadWorld();
  </script>
</body>
