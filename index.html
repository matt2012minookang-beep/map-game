<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>한국 중심 세계지도</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1f4d;
      touch-action: none;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }

    #map {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #0b1f4d;
      cursor: grab;
    }

    #map:active {
      cursor: grabbing;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      background: #0b1f4d;
    }

    .land {
      fill: #e7d8b4;
      stroke: #4f4330;
      stroke-width: 0.55;
      vector-effect: non-scaling-stroke;
    }

    .country-label {
      fill: #2e261b;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      user-select: none;
      paint-order: stroke;
      stroke: rgba(245, 239, 224, 0.96);
      stroke-width: 2.2px;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .country-label tspan {
      dominant-baseline: middle;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 20px;
      background: #0b1f4d;
      z-index: 10;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #ffd6d6;
    }
  </style>
</head>

    function project(lon, lat) {
      const x = ((lon + 180) / 360) * WORLD_W;
      const y = ((90 - lat) / 180) * WORLD_H;
      return [x, y];
    }

    function normalizeLon180(lon) {
      let v = lon;
      while (v < -180) v += 360;
      while (v > 180) v -= 360;
      return v;
    }

    function splitRingAtDateline(ring) {
      if (!ring || ring.length < 2) return [ring];

      const segments = [];
      let current = [ring[0]];

      for (let i = 1; i < ring.length; i++) {
        const prev = ring[i - 1];
        const curr = ring[i];
        const prevLon = normalizeLon180(prev[0]);
        const currLon = normalizeLon180(curr[0]);
        const jump = Math.abs(currLon - prevLon);

        if (jump > 180) {
          if (current.length >= 3) segments.push(current);
          current = [curr];
        } else {
          current.push(curr);
        }
      }

      if (current.length >= 3) segments.push(current);
      return segments;
    }

    function buildPathFromRing(ring) {
      if (!ring || !ring.length) return "";
      let d = "";
      for (let i = 0; i < ring.length; i++) {
        const [lon, lat] = ring[i];
        const [x, y] = project(lon, lat);
        d += (i === 0 ? "M" : "L") + x + " " + y + " ";
      }
      d += "Z ";
      return d;
    }

    function geometryToPath(geometry) {
      let d = "";

      if (geometry.type === "Polygon") {
        for (const ring of geometry.coordinates) {
          const pieces = splitRingAtDateline(ring);
          for (const piece of pieces) d += buildPathFromRing(piece);
        }
      } else if (geometry.type === "MultiPolygon") {
        for (const polygon of geometry.coordinates) {
          for (const ring of polygon) {
            const pieces = splitRingAtDateline(ring);
            for (const piece of pieces) d += buildPathFromRing(piece);
          }
        }
      }

      return d;
    }

    function polygonArea(points) {
      let area = 0;
      const n = points.length;
      for (let i = 0; i < n; i++) {
        const [x1, y1] = points[i];
        const [x2, y2] = points[(i + 1) % n];
        area += x1 * y2 - x2 * y1;
      }
      return Math.abs(area) * 0.5;
    }

    function polygonCentroid(points) {
      let a = 0;
      let cx = 0;
      let cy = 0;
      const n = points.length;

      for (let i = 0; i < n; i++) {
        const [x1, y1] = points[i];
        const [x2, y2] = points[(i + 1) % n];
        const f = x1 * y2 - x2 * y1;
        a += f;
        cx += (x1 + x2) * f;
        cy += (y1 + y2) * f;
      }

      a *= 0.5;
      if (Math.abs(a) < 1e-6) {
        let sx = 0, sy = 0;
        for (const [x, y] of points) {
          sx += x;
          sy += y;
        }
        return [sx / points.length, sy / points.length];
      }

      return [cx / (6 * a), cy / (6 * a)];
    }

    function pointInPolygon(point, polygon) {
      const [px, py] = point;
      let inside = false;

      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const [xi, yi] = polygon[i];
        const [xj, yj] = polygon[j];

        const intersect =
          ((yi > py) !== (yj > py)) &&
          (px < (xj - xi) * (py - yi) / ((yj - yi) || 1e-9) + xi);

        if (intersect) inside = !inside;
      }

      return inside;
    }

    function getProjectedPieces(geometry) {
      const pieces = [];

      if (geometry.type === "Polygon") {
        for (const ring of geometry.coordinates) {
          for (const piece of splitRingAtDateline(ring)) {
            pieces.push(piece.map(([lon, lat]) => project(lon, lat)));
          }
        }
      } else if (geometry.type === "MultiPolygon") {
        for (const polygon of geometry.coordinates) {
          for (const ring of polygon) {
            for (const piece of splitRingAtDateline(ring)) {
              pieces.push(piece.map(([lon, lat]) => project(lon, lat)));
            }
          }
        }
      }

      return pieces.filter(p => p.length >= 3);
    }

    function getBestLabelPlacement(geometry) {
      const pieces = getProjectedPieces(geometry);
      if (!pieces.length) return null;

      let best = null;

      for (const piece of pieces) {
        const area = polygonArea(piece);
        if (!best || area > best.area) {
          let [cx, cy] = polygonCentroid(piece);
          if (!pointInPolygon([cx, cy], piece)) {
            let sx = 0, sy = 0;
            for (const [x, y] of piece) {
              sx += x;
              sy += y;
            }
            cx = sx / piece.length;
            cy = sy / piece.length;
          }

          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          for (const [x, y] of piece) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }

          best = {
            x: cx,
            y: cy,
            area,
            width: maxX - minX,
            height: maxY - minY
          };
        }
      }

      return best;
    }

    function getCountryCode(feature) {
      const p = feature.properties || {};
      const candidates = [p.ISO_A2, p.iso_a2, p["ISO3166-1-Alpha-2"], p.ISO2, p.iso2];
      for (const code of candidates) {
        if (typeof code === "string") {
          const c = code.trim().toUpperCase();
          if (/^[A-Z]{2}$/.test(c)) return c;
        }
      }
      return null;
    }

    function getEnglishCountryName(feature) {
      const p = feature.properties || {};
      return (
        p.ADMIN ||
        p.NAME_LONG ||
        p.NAME ||
        p.SOVEREIGNT ||
        p.BRK_NAME ||
        p.name ||
        "이름없음"
      );
    }

    function shouldHideFeature(feature) {
      const code = getCountryCode(feature);
      const en = getEnglishCountryName(feature);
      return HIDE_CODES.has(code) || HIDE_NAMES.has(en);
    }

    function getCountryNameKo(feature) {
      const code = getCountryCode(feature);
      const en = getEnglishCountryName(feature);
      const p = feature.properties || {};

      if (code && nameByCode[code]) return nameByCode[code];
      if (nameByEnglish[en]) return nameByEnglish[en];
      if (typeof p.NAME_KO === "string" && p.NAME_KO.trim()) return p.NAME_KO.trim();

      return en
        .replace(/\s*Special Administrative Region\s*/gi, "")
        .replace(/\s*S\.?A\.?R\.?\s*/gi, "")
        .replace(/\s*SAR\s*/gi, "")
        .trim();
    }

    function splitNameLines(name, maxCharsPerLine) {
      const words = name.split(/\s+/).filter(Boolean);
      if (words.length === 1) return [name];

      const lines = [];
      let current = "";

      for (const word of words) {
        if (!current) {
          current = word;
        } else if ((current + " " + word).length <= maxCharsPerLine) {
          current += " " + word;
        } else {
          lines.push(current);
          current = word;
        }
      }

      if (current) lines.push(current);
      return lines;
    }

    function fitLabelInsideCountry(name, width, height, area) {
      let font = Math.max(6.5, Math.min(24, Math.sqrt(area) * 0.16));
      let lines = [name];

      for (let i = 0; i < 40; i++) {
        const maxChars = name.length >= 10 ? 6 : name.length >= 7 ? 7 : 99;
        lines = splitNameLines(name, maxChars);

        const longest = lines.reduce((m, s) => Math.max(m, s.length), 1);
        const labelWidth = longest * font * 0.62;
        const labelHeight = lines.length * font * 0.90;

        if (labelWidth <= width * 0.88 && labelHeight <= height * 0.82) {
          return {
            font,
            lines,
            textWidth: labelWidth,
            textHeight: labelHeight
          };
        }

        font -= 0.5;
        if (font < 6.5) break;
      }

      return null;
    }

    function chooseLabelZoom(area, width, height, nameLength) {
      if (area > 30000 && width > 120 && height > 32) return 1.0;
      if (area > 15000 && width > 80 && height > 20) return 1.15;
      if (area > 7000 && width > 50 && height > 14) return 1.45;
      if (area > 2500 && width > 28 && height > 10) return 1.9;
      if (area > 900 && width > 16 && height > 7) return 2.8;
      if (area > 250) return 4.2;
      if (area > 80) return 6.2;
      if (nameLength <= 4) return 8.5;
      if (nameLength <= 8) return 11;
      return 14;
    }

    function createLabelElement(item) {
      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("class", "country-label");
      text.setAttribute("font-size", item.baseFontSize.toFixed(2));

      const lineGap = item.baseFontSize * 0.95;
      const firstDy = -((item.lines.length - 1) * lineGap) / 2;

      item.lines.forEach((line, idx) => {
        const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
        tspan.setAttribute("x", item.x.toFixed(2));
        tspan.setAttribute("dy", idx === 0 ? firstDy.toFixed(2) : lineGap.toFixed(2));
        tspan.textContent = line;
        text.appendChild(tspan);
      });

      return text;
    }

    function clampTranslate() {
      const scaledW = WORLD_W * scale;
      const scaledH = WORLD_H * scale;

      if (scaledW <= VIEW_W) {
        translateX = (VIEW_W - scaledW) / 2;
      } else {
        const minX = VIEW_W - scaledW;
        const maxX = 0;
        if (translateX < minX) translateX = minX;
        if (translateX > maxX) translateX = maxX;
      }

      if (scaledH <= VIEW_H) {
        translateY = (VIEW_H - scaledH) / 2;
      } else {
        const minY = VIEW_H - scaledH;
        const maxY = 0;
        if (translateY < minY) translateY = minY;
        if (translateY > maxY) translateY = maxY;
      }
    }

    function rectsOverlap(a, b) {
      return !(
        a.right <= b.left ||
        a.left >= b.right ||
        a.bottom <= b.top ||
        a.top >= b.bottom
      );
    }

    function estimateLabelRectScreen(item, oxScreen, oyScreen) {
      const cx = item.x * scale + translateX + oxScreen;
      const cy = item.y * scale + translateY + oyScreen;
      const w = item.textWidth * scale;
      const h = item.textHeight * scale;
      return {
        left: cx - w / 2 - 4,
        right: cx + w / 2 + 4,
        top: cy - h / 2 - 3,
        bottom: cy + h / 2 + 3
      };
    }

    function applyLabelLayout() {
      for (const item of labelItems) {
        item.el.style.display = "none";
        item.el.removeAttribute("transform");
      }

      const shown = [];
      const ordered = [...labelItems]
        .filter(item => scale >= item.minZoom)
        .sort((a, b) => b.priority - a.priority);

      for (const item of ordered) {
        const f = item.baseFontSize;
        const tryOffsets = [
          [0, 0],
          [0, -f * 0.9],
          [0, f * 0.9],
          [-f * 1.05, 0],
          [f * 1.05, 0],
          [-f * 0.95, -f * 0.85],
          [f * 0.95, -f * 0.85],
          [-f * 0.95, f * 0.85],
          [f * 0.95, f * 0.85]
        ];

        let picked = null;
        let pickedRect = null;

        for (const [ox, oy] of tryOffsets) {
          const rect = estimateLabelRectScreen(item, ox * scale, oy * scale);

          if (
            rect.right < -20 || rect.left > VIEW_W + 20 ||
            rect.bottom < -20 || rect.top > VIEW_H + 20
          ) {
            continue;
          }

          let overlap = false;
          for (const placed of shown) {
            if (rectsOverlap(rect, placed.rect)) {
              overlap = true;
              break;
            }
          }

          if (!overlap) {
            picked = [ox, oy];
            pickedRect = rect;
            break;
          }
        }

        if (!picked) continue;

        const tspans = item.el.querySelectorAll("tspan");
        const lineGap = item.baseFontSize * 0.95;
        const firstDy = -((item.lines.length - 1) * lineGap) / 2;

        tspans.forEach((tspan, idx) => {
          tspan.setAttribute("x", (item.x + picked[0]).toFixed(2));
          tspan.setAttribute("dy", idx === 0 ? firstDy.toFixed(2) : lineGap.toFixed(2));
        });

        item.el.setAttribute("transform", `translate(0 ${picked[1].toFixed(2)})`);
        item.el.style.display = "";
        shown.push({ rect: pickedRect });
      }
    }

    function setTransform() {
      clampTranslate();
      world.setAttribute("transform", `translate(${translateX} ${translateY}) scale(${scale})`);
      applyLabelLayout();
    }

    function zoomAt(clientX, clientY, factor) {
      const rect = svg.getBoundingClientRect();
      const px = ((clientX - rect.left) / rect.width) * VIEW_W;
      const py = ((clientY - rect.top) / rect.height) * VIEW_H;

      const newScale = Math.max(minScale, Math.min(maxScale, scale * factor));
      const actualFactor = newScale / scale;
      if (actualFactor === 1) return;

      translateX = px - (px - translateX) * actualFactor;
      translateY = py - (py - translateY) * actualFactor;
      scale = newScale;
      setTransform();
    }

    function getTouchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.hypot(dx, dy);
    }

    function getTouchCenter(t1, t2) {
      return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
      };
    }

    svg.addEventListener("wheel", (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.24 : 1 / 1.24);
    }, { passive: false });

    svg.addEventListener("pointerdown", (e) => {
      if (e.pointerType !== "mouse" || e.button === 0) {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        svg.setPointerCapture(e.pointerId);
      }
    });

    svg.addEventListener("pointermove", (e) => {
      if (!isDragging) return;

      const rect = svg.getBoundingClientRect();
      translateX += (e.clientX - lastX) * (VIEW_W / rect.width);
      translateY += (e.clientY - lastY) * (VIEW_H / rect.height);
      lastX = e.clientX;
      lastY = e.clientY;
      setTransform();
    });

    function endDrag() {
      isDragging = false;
    }

    svg.addEventListener("pointerup", endDrag);
    svg.addEventListener("pointercancel", endDrag);
    svg.addEventListener("pointerleave", endDrag);

    svg.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        pinchStartDist = getTouchDistance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
        pinchStartTX = translateX;
        pinchStartTY = translateY;

        const center = getTouchCenter(e.touches[0], e.touches[1]);
        const rect = svg.getBoundingClientRect();
        pinchAnchor = {
          x: ((center.x - rect.left) / rect.width) * VIEW_W,
          y: ((center.y - rect.top) / rect.height) * VIEW_H
        };
      }
    }, { passive: false });

    svg.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();

        const dist = getTouchDistance(e.touches[0], e.touches[1]);
        const factor = dist / Math.max(1, pinchStartDist);
        const newScale = Math.max(minScale, Math.min(maxScale, pinchStartScale * factor));

        const center = getTouchCenter(e.touches[0], e.touches[1]);
        const rect = svg.getBoundingClientRect();
        const cx = ((center.x - rect.left) / rect.width) * VIEW_W;
        const cy = ((center.y - rect.top) / rect.height) * VIEW_H;

        if (pinchAnchor) {
          const actualFactor = newScale / pinchStartScale;
          translateX = pinchAnchor.x - (pinchAnchor.x - pinchStartTX) * actualFactor;
          translateY = pinchAnchor.y - (pinchAnchor.y - pinchStartTY) * actualFactor;

          translateX += (cx - pinchAnchor.x);
          translateY += (cy - pinchAnchor.y);
        }

        scale = newScale;
        setTransform();
      }
    }, { passive: false });

    svg.addEventListener("touchend", () => {
      pinchAnchor = null;
    });

    function centerOnKorea(initialScale) {
      const [kx, ky] = project(127.7669, 35.9078);
      scale = Math.max(minScale, Math.min(maxScale, initialScale));
      translateX = VIEW_W / 2 - kx * scale;
      translateY = VIEW_H / 2 - ky * scale;
      setTransform();
    }

    async function loadWorld() {
      try {
        const res = await fetch("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_0_countries.geojson");
        const geojson = await res.json();

        for (const feature of geojson.features) {
          if (!feature.geometry || shouldHideFeature(feature)) continue;

          const d = geometryToPath(feature.geometry);
          if (!d) continue;

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("class", "land");
          countriesGroup.appendChild(path);

          const placement = getBestLabelPlacement(feature.geometry);
          if (!placement) continue;

          const name = getCountryNameKo(feature);
          const fit = fitLabelInsideCountry(name, placement.width, placement.height, placement.area);
          if (!fit) continue;

          const minZoomForLabel = chooseLabelZoom(
            placement.area,
            placement.width,
            placement.height,
            name.length
          );

          const item = {
            name,
            lines: fit.lines,
            x: placement.x,
            y: placement.y,
            baseFontSize: fit.font,
            textWidth: fit.textWidth,
            textHeight: fit.textHeight,
            minZoom: minZoomForLabel,
            priority: placement.area * 10 + Math.min(placement.width, 180) * 4 + Math.min(placement.height, 80) * 3
          };

          item.el = createLabelElement(item);
          labelsGroup.appendChild(item.el);
          labelItems.push(item);
        }

        loading.classList.add("hidden");
        minScale = 1;
        centerOnKorea(2.2);
      } catch (err) {
        loading.textContent = "지도 데이터를 불러오지 못했습니다.";
        loading.classList.add("error");
        console.error(err);
      }
    }

    loadWorld();
  </script>
</body>
